<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- Paintlang social banner (X header 1500x500; crop center for others).
       Two rooms of the studio: the left is the IDE, the right warms toward
       canvas paper. Code lives on the code side, the mark paints on the
       canvas side. -->
  <rect width="1500" height="500" fill="#1e1e1e"/>
  <rect x="1010" y="0" width="490" height="500" fill="#f6f1e7" opacity=".05"/>
  <!-- the code side, written as code -->
  <g font-family="Consolas,Menlo,monospace">
    <text x="128" y="192" font-size="30" fill="#5a5a5a" text-anchor="end">1</text>
    <text x="128" y="278" font-size="30" fill="#5a5a5a" text-anchor="end">2</text>
    <text x="128" y="352" font-size="30" fill="#5a5a5a" text-anchor="end">3</text>
    <text x="168" y="192" font-size="30" fill="#6a9955" font-style="italic">// the code and the canvas are the same artwork</text>
    <text x="168" y="285" font-size="78" font-weight="bold"><tspan fill="#dcdcaa">paint(</tspan><tspan fill="#ce9178">'paintlang'</tspan><tspan fill="#dcdcaa">)</tspan></text>
    <text x="168" y="352" font-size="30" fill="#569cd6">paintlang.com</text>
  </g>
  <!-- the mark, on the canvas side -->
  <g transform="translate(1047,36) scale(0.75)">
    <path d="M218 118 C170 118 180 166 180 198 C180 234 152 246 134 256
             C152 266 180 278 180 314 C180 346 170 394 218 394"
          fill="none" stroke="#569cd6" stroke-width="32" stroke-linecap="round"/>
    <path d="M296 112 C382 148 408 236 376 312 C352 370 314 408 288 428
             C304 362 324 314 332 268 C342 216 334 158 284 128 Z"
          fill="#ce9178" opacity=".35" transform="translate(-6 -4) scale(1.045)"/>
    <path d="M296 112 C382 148 408 236 376 312 C352 370 314 408 288 428
             C304 362 324 314 332 268 C342 216 334 158 284 128 Z"
          fill="#ce9178"/>
    <path d="M310 136 C368 170 386 234 368 292 C378 228 362 172 310 136 Z"
          fill="#e8b48d" opacity=".8"/>
    <circle cx="278" cy="446" r="13" fill="#ce9178"/>
  </g>
</svg>
