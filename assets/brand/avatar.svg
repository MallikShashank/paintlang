<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Paintlang mark: the code and the canvas are the same artwork.
       Left half: a code brace. Right half: one loaded brushstroke.
       VS Code dark tile, keyword blue, warm paint. -->
  <rect width="512" height="512" rx="104" fill="#1e1e1e"/>
  <!-- the brace -->
  <path d="M218 118 C170 118 180 166 180 198 C180 234 152 246 134 256
           C152 266 180 278 180 314 C180 346 170 394 218 394"
        fill="none" stroke="#569cd6" stroke-width="32" stroke-linecap="round"/>
  <!-- the stroke: feather pass then body, same colour family (value-true) -->
  <path d="M296 112 C382 148 408 236 376 312 C352 370 314 408 288 428
           C304 362 324 314 332 268 C342 216 334 158 284 128 Z"
        fill="#ce9178" opacity=".35" transform="translate(-6 -4) scale(1.045)"/>
  <path d="M296 112 C382 148 408 236 376 312 C352 370 314 408 288 428
           C304 362 324 314 332 268 C342 216 334 158 284 128 Z"
        fill="#ce9178"/>
  <!-- the catch of light on the loaded side -->
  <path d="M310 136 C368 170 386 234 368 292 C378 228 362 172 310 136 Z"
        fill="#e8b48d" opacity=".8"/>
  <!-- one drop of paint where the stroke lifts off -->
  <circle cx="278" cy="446" r="13" fill="#ce9178"/>
</svg>
